services:
  airflow-init:
    profiles: ["airflow"]
    image: apache/airflow:2.8.4
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --password admin --firstname Airflow --lastname Admin --role Admin --email admin@example.com"

  airflow-scheduler:
    profiles: ["airflow"]
    image: apache/airflow:2.8.4
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    command: scheduler

  airflow-webserver:
    profiles: ["airflow"]
    image: apache/airflow:2.8.4
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    ports:
      - "8080:8080"
    command: webserver

  airflow_postgres:
    profiles: ["airflow"]
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  postgres:
    image: postgres:15
    container_name: crypto_postgres
    environment:
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
      POSTGRES_DB: crypto_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backfill:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: crypto_db
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    volumes:
      - backfill_state:/var/lib/backfill
    command: >
      sh -c "
      if [ ! -f /var/lib/backfill/done ]; then
        python -m src.backfill &&
        touch /var/lib/backfill/done;
      fi
      "

  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    depends_on:
      postgres:
        condition: service_healthy
      backfill:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: crypto_db
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    command: ["python", "-m", "src.main"]

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: crypto_db
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    ports:
      - "8501:8501"
    command:
      ["streamlit", "run", "src/dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]

volumes:
  postgres_data:
  backfill_state: